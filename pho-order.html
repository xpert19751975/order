<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍜 PHO TRUCK PARTY — 주문하기</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #E63946;
    --orange: #F4A261;
    --cream: #FFF8EF;
    --dark: #1A0A00;
    --brown: #5C3317;
    --green: #2D6A4F;
    --yellow: #FFD166;
    --white: #FFFFFF;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--cream);
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--dark);
    min-height: 100vh;
  }

  .hero {
    background: var(--dark);
    padding: 32px 24px 28px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(45deg, transparent, transparent 20px, rgba(244,162,97,0.06) 20px, rgba(244,162,97,0.06) 40px);
  }
  .hero-label { font-family: 'Unbounded', sans-serif; font-size: 10px; letter-spacing: 4px; color: var(--orange); text-transform: uppercase; margin-bottom: 10px; position: relative; }
  .hero-title { font-family: 'Unbounded', sans-serif; font-size: clamp(28px, 8vw, 52px); font-weight: 900; color: var(--white); line-height: 1; position: relative; }
  .hero-title span { color: var(--orange); }
  .hero-sub { font-size: 13px; color: rgba(255,255,255,0.5); margin-top: 10px; position: relative; }

  .name-section {
    background: var(--orange);
    padding: 18px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .name-label { font-family: 'Unbounded', sans-serif; font-size: 11px; font-weight: 700; color: var(--dark); white-space: nowrap; }
  .name-input {
    border: 2.5px solid var(--dark);
    background: var(--white);
    padding: 10px 16px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    font-weight: 700;
    border-radius: 8px;
    width: 160px;
    outline: none;
    transition: box-shadow 0.2s;
  }
  .name-input:focus { box-shadow: 4px 4px 0 var(--dark); }
  .name-confirm {
    background: var(--dark);
    color: var(--orange);
    border: none;
    padding: 10px 18px;
    font-family: 'Unbounded', sans-serif;
    font-size: 11px;
    font-weight: 700;
    border-radius: 8px;
    cursor: pointer;
    transition: transform 0.15s;
    white-space: nowrap;
  }
  .name-confirm:hover { transform: translateY(-2px); }

  .main { max-width: 860px; margin: 0 auto; padding: 28px 16px 60px; }

  .section-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--brown);
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title::after { content: ''; flex: 1; height: 1.5px; background: var(--brown); opacity: 0.2; }

  .menu-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 14px;
    margin-bottom: 32px;
  }

  .menu-card {
    background: var(--white);
    border: 2px solid transparent;
    border-radius: 14px;
    padding: 18px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    user-select: none;
    animation: fadeUp 0.4s ease both;
  }
  @keyframes fadeUp { from { opacity:0; transform:translateY(16px);} to { opacity:1; transform:translateY(0);} }
  .menu-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.1); border-color: var(--orange); }
  .menu-card.selected { border-color: var(--red); background: #FFF5F5; box-shadow: 0 0 0 4px rgba(230,57,70,0.1); }
  .menu-card.taken { opacity: 0.4; cursor: not-allowed; }
  .menu-card.taken:hover { transform: none; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border-color: transparent; }

  .menu-emoji { font-size: 30px; margin-bottom: 8px; display: block; }
  .menu-name { font-family: 'Unbounded', sans-serif; font-size: 12px; font-weight: 700; color: var(--dark); margin-bottom: 4px; line-height: 1.3; }
  .menu-desc { font-size: 11.5px; color: #999; line-height: 1.5; margin-bottom: 10px; }
  .menu-price { font-family: 'Unbounded', sans-serif; font-size: 14px; font-weight: 900; color: var(--red); }

  .menu-badge { position: absolute; top: 12px; right: 12px; font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 20px; font-family: 'Unbounded', sans-serif; }
  .badge-hot { background: var(--red); color: white; }
  .badge-new { background: var(--green); color: white; }
  .badge-taken { background: #e0e0e0; color: #999; }

  .check-icon {
    position: absolute; bottom: 12px; right: 12px;
    width: 26px; height: 26px;
    background: var(--red); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 14px;
    opacity: 0; transition: all 0.2s; transform: scale(0.5);
  }
  .menu-card.selected .check-icon { opacity: 1; transform: scale(1); }

  .taker-name { font-size: 11px; color: #bbb; margin-top: 5px; font-weight: 600; }

  .qty-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
  .qty-label { font-size: 12px; color: #777; }
  .qty-btn {
    width: 26px; height: 26px; border: 2px solid var(--dark);
    background: white; border-radius: 6px; font-size: 15px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .qty-btn:hover { background: var(--dark); color: white; }
  .qty-num { font-family: 'Unbounded', sans-serif; font-size: 14px; font-weight: 700; min-width: 18px; text-align: center; }

  .spice-row { display: flex; gap: 5px; margin-top: 8px; flex-wrap: wrap; }
  .spice-btn {
    font-size: 11px; padding: 3px 9px; border-radius: 20px;
    border: 1.5px solid #ddd; background: white;
    cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.15s; color: #777;
  }
  .spice-btn.active { border-color: var(--red); background: var(--red); color: white; font-weight: 700; }

  /* SUMMARY */
  .summary-box { background: var(--dark); border-radius: 18px; padding: 24px; color: white; margin-bottom: 16px; }
  .summary-title { font-family: 'Unbounded', sans-serif; font-size: 12px; font-weight: 700; color: var(--orange); margin-bottom: 16px; letter-spacing: 1px; }
  .summary-empty { text-align: center; color: rgba(255,255,255,0.3); font-size: 13px; padding: 16px 0; }
  .summary-item { display: flex; justify-content: space-between; align-items: flex-start; padding: 9px 0; border-bottom: 1px solid rgba(255,255,255,0.08); gap: 10px; }
  .summary-item:last-of-type { border-bottom: none; }
  .summary-item-name { font-size: 13px; font-weight: 600; }
  .summary-item-sub { font-size: 11px; color: var(--orange); margin-top: 2px; }
  .summary-item-price { font-family: 'Unbounded', sans-serif; font-size: 13px; font-weight: 700; color: var(--yellow); white-space: nowrap; }
  .summary-total { display: flex; justify-content: space-between; align-items: center; margin-top: 14px; padding-top: 14px; border-top: 2px solid rgba(255,255,255,0.12); }
  .total-label { font-family: 'Unbounded', sans-serif; font-size: 10px; color: rgba(255,255,255,0.4); letter-spacing: 2px; }
  .total-price { font-family: 'Unbounded', sans-serif; font-size: 22px; font-weight: 900; color: var(--yellow); }

  .order-btn {
    width: 100%; background: var(--red); color: white; border: none;
    padding: 18px; font-family: 'Unbounded', sans-serif; font-size: 13px; font-weight: 700;
    border-radius: 14px; cursor: pointer; transition: all 0.2s; letter-spacing: 1px;
  }
  .order-btn:hover:not(:disabled) { background: #c1121f; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(230,57,70,0.4); }
  .order-btn:disabled { background: #ccc; cursor: not-allowed; }

  .reset-link { display: block; margin-top: 10px; font-size: 11px; color: #bbb; cursor: pointer; text-decoration: underline; text-align: center; }
  .reset-link:hover { color: var(--red); }

  /* SUCCESS */
  .success-screen {
    display: none;
    text-align: center;
    padding: 60px 24px;
    animation: fadeUp 0.5s ease;
  }
  .success-screen.show { display: block; }
  .success-emoji { font-size: 64px; margin-bottom: 16px; }
  .success-title { font-family: 'Unbounded', sans-serif; font-size: 22px; font-weight: 900; color: var(--dark); margin-bottom: 10px; }
  .success-sub { font-size: 14px; color: #888; line-height: 1.6; }
  .success-items { background: white; border-radius: 14px; padding: 20px; margin: 20px 0; text-align: left; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
  .success-item { padding: 8px 0; border-bottom: 1px dashed #eee; font-size: 13px; display: flex; justify-content: space-between; }
  .success-item:last-child { border-bottom: none; }

  .toast {
    position: fixed; top: 20px; left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--dark); color: var(--orange);
    padding: 12px 24px; border-radius: 30px;
    font-family: 'Unbounded', sans-serif; font-size: 11px; font-weight: 700;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 9999; white-space: nowrap; letter-spacing: 0.5px;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* loading overlay */
  .loading-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(26,10,0,0.6);
    z-index: 999;
    align-items: center; justify-content: center;
    flex-direction: column; gap: 14px;
  }
  .loading-overlay.show { display: flex; }
  .spinner {
    width: 40px; height: 40px;
    border: 4px solid rgba(255,255,255,0.2);
    border-top-color: var(--orange);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-family: 'Unbounded', sans-serif; font-size: 12px; color: var(--orange); letter-spacing: 1px; }

  @media (max-width: 500px) {
    .menu-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
    .menu-card { padding: 13px; }
    .menu-emoji { font-size: 24px; }
    .menu-name { font-size: 10px; }
    .menu-desc { display: none; }
  }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-label">🎉 PARTY ORDER</div>
  <div class="hero-title">PHO <span>TRUCK</span></div>
  <div class="hero-sub">원하는 메뉴를 골라 주문을 확정해 주세요</div>
</div>

<div class="name-section">
  <div class="name-label">👤 내 이름</div>
  <input class="name-input" id="nameInput" type="text" placeholder="이름 입력..." maxlength="10">
  <button class="name-confirm" onclick="setName()">확인 ✓</button>
</div>

<div class="main" id="mainContent">

  <div id="orderSection">
    <div class="section-title">🍜 메뉴판</div>
    <div class="menu-grid" id="menuGrid"></div>

    <div class="section-title">🛒 내 주문</div>
    <div class="summary-box">
      <div class="summary-title">ORDER SUMMARY</div>
      <div id="summaryList"><div class="summary-empty">이름 입력 후 메뉴를 선택하세요</div></div>
      <div class="summary-total" id="summaryTotal" style="display:none">
        <div class="total-label">TOTAL</div>
        <div class="total-price" id="totalPrice">₩0</div>
      </div>
    </div>
    <button class="order-btn" id="orderBtn" onclick="placeOrder()" disabled>주문 확정하기 →</button>
    <span class="reset-link" onclick="resetAll()">선택 초기화</span>
  </div>

  <div class="success-screen" id="successScreen">
    <div class="success-emoji">🎉</div>
    <div class="success-title" id="successTitle"></div>
    <div class="success-sub">주문이 전달됐어요!<br>파티 당일 맛있게 드세요 🍜</div>
    <div class="success-items" id="successItems"></div>
    <button class="order-btn" onclick="resetAll()" style="margin-top:10px">다시 주문하기</button>
  </div>

</div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text">전송 중...</div>
</div>

<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby8OXyd8vBsI29D1AXoA-bce6RXxQyzjhUVhMdTus1E3M5SWOFB5E06sFpETr0Z5Gqg0Q/exec";

const MENU = [
  { id:1, emoji:"🍜", name:"김풍 파스타 국수", desc:"파스타 + 골뱅이(반조리)", price:20000, badge:"hot", spice:true },
  { id:2, emoji:"🍗", name:"테바사키(닭날개구이)", desc:"윗봉 + 아랫봉", price:30000, badge:"hot", spice:true },
  { id:3, emoji:"🥢", name:"안키모 김밥", desc:"특제 양남 아귀간 + 오이김밥", price:18000, badge:"hot", spice:false },
  { id:4, emoji:"🥗", name:"고수 볶음", desc:"고수 한단 무침", price:10000, badge:"new", spice:false },
  { id:5, emoji:"🍱", name:"정호영 냉제육", desc:"냉부 정호영 비법 냉제육", price:20000, badge:null, spice:false },
  { id:6, emoji:"🧆", name:"가지 쯔유 조림", desc:"일본식 가지 조림", price:8000, badge:null, spice:false },
  { id:7, emoji:"🫕", name:"감자사라다", desc:"감자사라다 + 베이컨", price:8000, badge:"new", spice:true },
  { id:8, emoji:"🧃", name:"모찌리도후", desc:"크림치즈 전분 없이 완제품 구입", price:8000, badge:null, spice:false },
];

let myName = "";
let mySelected = {}; // {id: {qty, spice}}
let takenMap = {};   // {menuId: name} — 다른 사람이 선택한 것

// ── 이름 확인 ──────────────────────────────
function setName() {
  const val = document.getElementById("nameInput").value.trim();
  if (!val) { showToast("이름을 입력해주세요!"); return; }
  myName = val;
  loadOrders();
}

// ── 기존 주문 불러오기 (중복 방지용) ──────────
async function loadOrders() {
  try {
    await fetch(SCRIPT_URL);
  } catch(e) {}
  showToast(`환영해요, ${myName}님! 🍜`);
  renderMenu();
  renderSummary();
}

// ── 메뉴 렌더 ──────────────────────────────
function renderMenu() {
  const grid = document.getElementById("menuGrid");
  grid.innerHTML = "";

  MENU.forEach((item, idx) => {
    const isTaken = false;
    const isMine = !!mySelected[item.id];

    let badgeHTML = "";
    if (isTaken) badgeHTML = `<span class="menu-badge badge-taken">${takenMap[item.id]}</span>`;
    else if (item.badge === "hot") badgeHTML = `<span class="menu-badge badge-hot">🔥 HOT</span>`;
    else if (item.badge === "new") badgeHTML = `<span class="menu-badge badge-new">NEW</span>`;

    let qtyHTML = "";
    if (isMine) {
      const q = mySelected[item.id].qty;
      qtyHTML = `<div class="qty-row" onclick="event.stopPropagation()">
        <span class="qty-label">수량</span>
        <button class="qty-btn" onclick="changeQty(${item.id},-1)">−</button>
        <span class="qty-num" id="qty_${item.id}">${q}</span>
        <button class="qty-btn" onclick="changeQty(${item.id},1)">+</button>
      </div>`;
    }

    let spiceHTML = "";
    if (isMine && item.spice) {
      const cur = mySelected[item.id].spice;
      spiceHTML = `<div class="spice-row" onclick="event.stopPropagation()">
        ${["순한맛","보통","매운맛"].map(s=>`<button class="spice-btn ${cur===s?"active":""}" onclick="setSpice(${item.id},'${s}')">${s}</button>`).join("")}
      </div>`;
    }

    const card = document.createElement("div");
    card.className = `menu-card${isMine?" selected":""}${isTaken?" taken":""}`;
    card.style.animationDelay = `${idx * 0.05}s`;
    card.onclick = () => toggleSelect(item.id);
    card.innerHTML = `
      ${badgeHTML}
      <span class="menu-emoji">${item.emoji}</span>
      <div class="menu-name">${item.name}</div>
      <div class="menu-desc">${item.desc}</div>
      <div class="menu-price">₩${item.price.toLocaleString()}</div>
      ${isTaken ? `<div class="taker-name">→ ${takenMap[item.id]}님 선택</div>` : ""}
      ${qtyHTML}${spiceHTML}
      <div class="check-icon">✓</div>`;
    grid.appendChild(card);
  });
}

function toggleSelect(id) {
  if (!myName) { showToast("먼저 이름을 입력해주세요!"); return; }
  if (mySelected[id]) delete mySelected[id];
  else mySelected[id] = { qty: 1, spice: "보통" };
  renderMenu();
  renderSummary();
}

function changeQty(id, d) {
  if (!mySelected[id]) return;
  let q = (mySelected[id].qty || 1) + d;
  mySelected[id].qty = Math.min(5, Math.max(1, q));
  document.getElementById(`qty_${id}`).textContent = mySelected[id].qty;
  renderSummary();
}

function setSpice(id, lvl) {
  if (!mySelected[id]) return;
  mySelected[id].spice = lvl;
  renderMenu();
}

// ── 요약 ──────────────────────────────────
function renderSummary() {
  const list = document.getElementById("summaryList");
  const totalRow = document.getElementById("summaryTotal");
  const btn = document.getElementById("orderBtn");
  const ids = Object.keys(mySelected).map(Number);

  if (!ids.length) {
    list.innerHTML = `<div class="summary-empty">메뉴를 선택하세요 🍜</div>`;
    totalRow.style.display = "none";
    btn.disabled = true;
    return;
  }

  let total = 0, html = "";
  ids.forEach(id => {
    const m = MENU.find(x => x.id === id);
    const sel = mySelected[id];
    const sub = m.price * sel.qty;
    total += sub;
    const spTag = m.spice ? ` · ${sel.spice}` : "";
    html += `<div class="summary-item">
      <div>
        <div class="summary-item-name">${m.emoji} ${m.name}</div>
        <div class="summary-item-sub">×${sel.qty}${spTag}</div>
      </div>
      <div class="summary-item-price">₩${sub.toLocaleString()}</div>
    </div>`;
  });

  list.innerHTML = html;
  document.getElementById("totalPrice").textContent = `₩${total.toLocaleString()}`;
  totalRow.style.display = "flex";
  btn.disabled = !myName;
}

// ── 주문 확정 ──────────────────────────────
async function placeOrder() {
  if (!myName) { showToast("이름을 입력해주세요!"); return; }
  const ids = Object.keys(mySelected).map(Number);
  if (!ids.length) { showToast("메뉴를 선택해주세요!"); return; }

  const items = ids.map(id => {
    const m = MENU.find(x => x.id === id);
    const sel = mySelected[id];
    return { id, name: m.name, qty: sel.qty, spice: m.spice ? sel.spice : "-", price: m.price * sel.qty };
  });

  showLoading(true);
  try {
    await fetch(SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name: myName, items })
    });

    showLoading(false);
    showSuccess(items);
  } catch(e) {
    showLoading(false);
    showToast("오류가 발생했어요. 다시 시도해주세요.");
  }
}

function showSuccess(items) {
  document.getElementById("orderSection").style.display = "none";
  const sc = document.getElementById("successScreen");
  sc.classList.add("show");
  document.getElementById("successTitle").textContent = `${myName}님, 주문 완료! 🎉`;
  let html = "";
  let total = 0;
  items.forEach(item => {
    total += item.price;
    html += `<div class="success-item">
      <span>${item.name} ×${item.qty}${item.spice!=="-"?" ("+item.spice+")":""}</span>
      <span>₩${item.price.toLocaleString()}</span>
    </div>`;
  });
  html += `<div class="success-item" style="font-weight:700;margin-top:4px">
    <span>합계</span><span style="color:var(--red)">₩${total.toLocaleString()}</span>
  </div>`;
  document.getElementById("successItems").innerHTML = html;
}

function resetAll() {
  mySelected = {};
  document.getElementById("successScreen").classList.remove("show");
  document.getElementById("orderSection").style.display = "block";
  renderMenu();
  renderSummary();
}

function showLoading(v) {
  document.getElementById("loadingOverlay").classList.toggle("show", v);
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2200);
}

renderMenu();
</script>
</body>
</html>
